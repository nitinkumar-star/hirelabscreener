<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RecruitOS · Live</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --n0:#fff;--n25:#FAFAF9;--n50:#F4F2EC;--n100:#EBE8E1;--n200:#DED9CF;--n300:#C9C3B6;--n400:#A8A498;--n500:#8C887E;--n600:#6B675E;--n700:#504D46;--n800:#33312B;--n900:#1B1B18;
 --p50:#E8F4EE;--p100:#C9E7D8;--p500:#15966A;--p600:#127A57;--p700:#0E6045;
 --ai50:#EEECFB;--ai100:#DAD6F6;--ai500:#534AB7;--ai700:#363080;--ai-glow:linear-gradient(135deg,#6E63D1,#534AB7);
 --success:#15966A;--success-bg:#E8F4EE;--warning:#C4841E;--warning-bg:#FBF1DE;--danger:#E24B4A;--danger-bg:#FBEAEA;--info:#378ADD;--info-bg:#E7F0FB;--wa:#1FA855;
 --bg:var(--n25);--surface:#fff;--surface-2:var(--n50);--border:var(--n100);--border-strong:var(--n200);
 --text:var(--n900);--text-2:var(--n600);--text-3:var(--n500);
 --r-md:8px;--r-lg:10px;--r-xl:12px;--e1:0 1px 2px rgba(40,38,30,.06);--e2:0 4px 12px rgba(40,38,30,.08);--e4:0 16px 40px rgba(40,38,30,.16);
}
[data-theme="dark"]{--bg:#161512;--surface:#1F1E1A;--surface-2:#27251F;--border:#302E28;--border-strong:#3A382F;--text:#F4F2EC;--text-2:#A8A498;--text-3:#8C887E;--p500:#2FA574;--p50:rgba(47,165,116,.14);--p700:#63BF97;--ai500:#6E63D1;--ai50:rgba(110,99,209,.16);--ai700:#948BE0;--success-bg:rgba(47,165,116,.16);--warning-bg:rgba(196,132,30,.16);--danger-bg:rgba(226,75,74,.16);--info-bg:rgba(55,138,221,.16);}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13.5px;line-height:20px;font-feature-settings:"tnum" 1}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
h1{font-size:20px;font-weight:700;margin:0;letter-spacing:-.01em}h3{font-size:15px;font-weight:600;margin:0}
.caption{font-size:12px;color:var(--text-2)}.micro{font-size:10.5px;color:var(--text-3)}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
a{color:var(--p600);cursor:pointer;text-decoration:none}
.btn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer}
.btn svg{width:15px;height:15px}.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-primary{background:var(--p500);color:#fff}.btn-primary:hover{background:var(--p600)}
.btn-secondary{background:var(--surface);color:var(--text);border-color:var(--border-strong)}.btn-secondary:hover{background:var(--surface-2)}
.btn-ghost{background:transparent;color:var(--text-2)}.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-ai{background:var(--ai500);color:#fff}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;background:transparent;color:var(--text-2);border-radius:var(--r-md);border:none;cursor:pointer}
.btn-icon:hover{background:var(--surface-2)}
.badge{display:inline-flex;align-items:center;gap:4px;height:20px;padding:0 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-neutral{background:var(--surface-2);color:var(--text-2)}.badge-success{background:var(--success-bg);color:var(--p700)}.badge-warning{background:var(--warning-bg);color:var(--warning)}.badge-info{background:var(--info-bg);color:var(--info)}.badge-ai{background:var(--ai50);color:var(--ai700)}.badge-live{background:var(--success-bg);color:var(--p700)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e1)}
.pad{padding:18px}
.input{height:34px;padding:0 12px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-md);color:var(--text);font:inherit;font-size:13.5px;width:100%}
.input:focus{outline:none;border-color:var(--p500);box-shadow:0 0 0 3px var(--p50)}
select.input{height:34px}
.avatar{width:34px;height:34px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex:none}
.avatar.sm{width:26px;height:26px;font-size:10px}.avatar.big{width:46px;height:46px;font-size:15px}
.app{display:grid;grid-template-columns:270px 1fr;height:100vh}
.side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.brand{height:54px;display:flex;align-items:center;gap:9px;padding:0 16px;border-bottom:1px solid var(--border);flex:none}
.logo{width:26px;height:26px;border-radius:7px;background:var(--ai-glow);display:flex;align-items:center;justify-content:center}
.logo svg{width:15px;height:15px;color:#fff}
.mlist{flex:1;overflow-y:auto;padding:8px}
.mrow{padding:10px 12px;border-radius:var(--r-md);cursor:pointer;margin-bottom:2px}
.mrow:hover{background:var(--surface-2)}.mrow.on{background:var(--p50)}
.mrow .mr{font-size:13px;font-weight:600}.mrow .ms{font-size:11px;color:var(--text-2)}
.main{display:flex;flex-direction:column;overflow:hidden}
.top{height:54px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;padding:0 18px;flex:none}
.content{flex:1;overflow-y:auto;padding:20px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:var(--surface-2);cursor:pointer}
.grid{display:grid;gap:16px}.g2{grid-template-columns:2fr 1fr}
@media(max-width:900px){.g2{grid-template-columns:1fr}.app{grid-template-columns:1fr}.side{display:none}}
.kv{padding:8px 0}.kv .k{font-size:10.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3)}.kv .v{font-size:13.5px;font-weight:600}
.subhead{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.ai-block{background:var(--ai50);border-left:2px solid var(--ai500);border-radius:var(--r-md);padding:12px 14px}
.ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ai700);margin-bottom:6px}
.ai-tag svg{width:12px;height:12px}
.chip{display:inline-flex;height:24px;align-items:center;padding:0 10px;border-radius:99px;background:var(--surface-2);font-size:12px;font-weight:600;color:var(--text-2);margin:0 6px 6px 0}
.lrow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}.lrow:last-child{border:none}.lrow .g{flex:1}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 13px;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--p700);border-bottom-color:var(--p500)}
.notice{max-width:520px;margin:60px auto;text-align:center}
.notice .ic{width:52px;height:52px;border-radius:14px;background:var(--warning-bg);color:var(--warning);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
.notice .ic svg{width:26px;height:26px}
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--e4);border-radius:var(--r-md);padding:10px 14px;font-size:13px;font-weight:500;min-width:240px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--p500);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.loadwrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--text-2)}
.modalwrap{position:fixed;inset:0;background:rgba(27,27,24,.4);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
.modalwrap.open{display:flex}
.modalbox{width:600px;max-width:100%;background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--e4);overflow:hidden}
.modalhead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}
.modalbody{padding:18px;max-height:60vh;overflow-y:auto}
.modalfoot{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field2{display:flex;flex-direction:column;gap:5px}.field2 label{font-size:11px;font-weight:600;color:var(--text-2)}
</style>
</head>
<body>
<div id="root"></div>
<div class="modalwrap" id="modal" onclick="if(event.target===this)closeModal()">
 <div class="modalbox"><div class="modalhead"><h3 id="modalTitle">Edit</h3>
  <button class="btn-icon" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
  <div class="modalbody" id="modalBody"></div>
  <div class="modalfoot"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" id="modalSave">Save</button></div></div>
</div>
<div class="toasts" id="toasts"></div>

<script>
const SP='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l1.9 4.6L18.5 9l-3.5 3 1 5-4-2.6L8 17l1-5L5.5 9z"/></svg>';
const PLUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:14px;height:14px"><path d="M12 5v14M5 12h14"/></svg>';
const STAGES=['Screening','Follow Up 1','Follow Up 2','Not Contacted','Called','Interested','Updated CV awaited','Not Interested','Shared with Client','Interview Inprocess','Not Suitable','Client Rejected on Paper','Client Rejected After Interview','Placed'];
let STATE={user:null,mandates:[],curMandate:null,candidates:[],curCand:null,tab:'overview',reminders:[],view:'mandate',addDest:'central',talent:{q:'',filters:{},results:[],page:1,total:0,searched:false,filtersOpen:false},clients:{list:[],q:'',status:'',page:1,pages:1,total:0,cur:null,contacts:[],meta:null,tab:'overview'}};

async function api(path,opts){
 const o=Object.assign({credentials:'same-origin',headers:{'Content-Type':'application/json'}},opts||{});
 const r=await fetch(path,o);
 if(r.status===401){const e=new Error('auth');e.auth=true;throw e;}
 if(!r.ok)throw new Error('HTTP '+r.status);
 const ct=r.headers.get('content-type')||'';return ct.includes('json')?r.json():r.text();
}
function toast(msg,type){
 type=type||'info';const col={success:'var(--success)',warning:'var(--warning)',danger:'var(--danger)',info:'var(--info)',ai:'var(--ai500)'}[type];
 const el=document.createElement('div');el.className='toast';el.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>${msg}`;
 document.getElementById('toasts').appendChild(el);setTimeout(()=>{el.style.opacity=0;setTimeout(()=>el.remove(),200)},3000);
}
const AV=['#15966A','#534AB7','#378ADD','#C4841E','#0E6045'];
function avColor(s){s=s||'?';let n=0;for(const c of s)n+=c.charCodeAt(0);return AV[n%AV.length]}
function initials(n){n=(n||'?').trim();return n.split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase()}
function av(n,cls){return `<div class="avatar ${cls||''}" style="background:${avColor(n)}">${initials(n)}</div>`}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function stageBadge(s){s=s||'—';const t=/plac/i.test(s)?'success':/reject|not/i.test(s)?'warning':/shar|interview/i.test(s)?'info':'neutral';return `<span class="badge badge-${t}">${esc(s)}</span>`}

/* ---------- boot ---------- */
async function boot(){
 try{
  const s=await api('/api/auth/status');
  if(s.state==='setup'){return notice('First-run setup needed','Open the main app at / to create your admin account, then reopen /v2.');}
  if(s.state!=='app'){return notice('Please sign in first','Log in on your main app at <b>/</b>, then reopen <b>/v2</b> in the same browser. This page shares your login.');}
  STATE.user=s.user;
  await loadMandates();
  renderShell();
 }catch(e){
  if(e.auth)return notice('Please sign in first','Log in on your main app at <b>/</b>, then reopen <b>/v2</b>.');
  notice('Can’t reach your backend','Open this page from your Render URL at <b>/v2</b> (e.g. <span class="mono">your-app.onrender.com/v2</span>) while logged in. Opening the file directly won’t connect to your data.');
 }
}
function notice(title,body){
 document.getElementById('root').innerHTML=`<div class="notice"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg></div>
  <h1 style="margin-bottom:8px">${title}</h1><p class="caption">${body}</p><div style="margin-top:16px"><a href="/" class="btn btn-secondary" style="text-decoration:none">Go to main app</a></div></div>`;
}
async function loadMandates(){STATE.mandates=await api('/api/mandates')||[];if(STATE.mandates.length&&!STATE.curMandate)STATE.curMandate=STATE.mandates[0].id;}

/* ---------- shell ---------- */
function renderShell(){
 document.getElementById('root').innerHTML=`
 <div class="app">
  <aside class="side">
   <div class="brand"><div class="logo">${SP}</div><b style="font-size:15px">RecruitOS</b><span class="badge badge-live" style="margin-left:auto">LIVE</span></div>
   <div style="padding:8px 8px 2px"><div class="mrow navitem" id="nav-talent" onclick="showTalent()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Talent</div><div class="ms">Search all candidates · Add new</div></div></div>
   <div style="padding:2px 8px 2px"><div class="mrow navitem" id="nav-clients" onclick="showClients()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 21h18M4 21V8l7-4 7 4v13M9 21v-5h6v5"/></svg>Clients</div><div class="ms">Companies · contacts · org chart</div></div></div>
   <div style="padding:10px 12px 4px" class="eyebrow">Mandates (${STATE.mandates.length})</div>
   <div class="mlist" id="mlist">${STATE.mandates.map(m=>`<div class="mrow ${m.id===STATE.curMandate?'on':''}" onclick="selMandate(${m.id})"><div class="mr">${esc(m.role||'Untitled')}</div><div class="ms">${esc(m.client||'')} ${m.location?'· '+esc(m.location):''}</div></div>`).join('')||'<div class="caption" style="padding:10px">No mandates found.</div>'}</div>
  </aside>
  <div class="main">
   <div class="top"><b id="topTitle">Candidates</b><span class="caption" id="topSub"></span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
     <span class="badge badge-neutral">${esc(STATE.user.display_name||STATE.user.username)}</span>
     <button class="btn-icon" onclick="toggleTheme()" title="Theme">${themeIcon()}</button>
     <a href="/" class="btn btn-ghost btn-sm">Old app</a>
    </div></div>
   <div class="content" id="content"></div>
  </div>
 </div>`;
 selMandate(STATE.curMandate);
}
function themeIcon(){return document.documentElement.getAttribute('data-theme')==='dark'
 ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>'
 :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>';}
function toggleTheme(){const r=document.documentElement;r.setAttribute('data-theme',r.getAttribute('data-theme')==='dark'?'light':'dark');const b=event.currentTarget;if(b)b.innerHTML=themeIcon();}

async function selMandate(mid){
 STATE.view='mandate';STATE.curMandate=mid;STATE.curCand=null;
 document.querySelectorAll('.mrow').forEach(x=>x.classList.remove('on'));
 const el=[...document.querySelectorAll('.mrow')].find(x=>x.getAttribute('onclick')==='selMandate('+mid+')');if(el)el.classList.add('on');
 const m=STATE.mandates.find(x=>x.id===mid)||{};
 document.getElementById('topTitle').textContent=m.role||'Candidates';
 document.getElementById('content').innerHTML='<div class="loadwrap"><span class="spin"></span> Loading your candidates…</div>';
 try{
  STATE.candidates=await api('/api/mandates/'+mid+'/candidates')||[];
  document.getElementById('topSub').textContent=STATE.candidates.length+' candidates';
  renderList();
 }catch(e){document.getElementById('content').innerHTML='<div class="caption" style="padding:20px">Could not load candidates. '+esc(e.message)+'</div>';}
}
function renderList(){
 const cs=STATE.candidates;
 document.getElementById('content').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
   <div class="caption">${cs.length} candidate${cs.length===1?'':'s'} in this mandate</div>
   <button class="btn btn-ai btn-sm" onclick="openAddCandidate(${STATE.curMandate})">${PLUS}Add candidate</button>
  </div>
  <div class="card" style="overflow:hidden">
   <table class="tbl"><thead><tr><th>Candidate</th><th>Company · Role</th><th>CTC</th><th>Notice</th><th>Stage</th><th>AI fit</th></tr></thead>
   <tbody>${cs.length?cs.map(c=>`<tr onclick="openCand(${c.id})">
     <td><div style="display:flex;align-items:center;gap:9px">${av(c.name,'sm')}<b>${esc(c.name||'—')}</b></div></td>
     <td class="caption">${esc(c.company||'—')}${c.designation?' · '+esc(c.designation):''}</td>
     <td class="mono">${c.ctc_current?esc(c.ctc_current):'—'}</td>
     <td class="caption">${esc(c.notice_period||'—')}</td>
     <td>${stageBadge(c.stage)}</td>
     <td>${c.ai_score?`<span class="badge badge-ai">${SP.replace('viewBox','style="width:11px;height:11px" viewBox')}${esc(c.ai_score)}%</span>`:'<span class="micro">—</span>'}</td>
    </tr>`).join(''):'<tr><td colspan="6" style="padding:30px;text-align:center" class="caption">No candidates in this mandate yet.</td></tr>'}</tbody></table>
  </div>`;
}

/* ---------- Wave 4: Talent (global search + add candidate) ---------- */
function showTalent(){
 STATE.view='talent';STATE.curCand=null;
 document.querySelectorAll('.mrow').forEach(x=>x.classList.remove('on'));
 const nt=document.getElementById('nav-talent');if(nt)nt.classList.add('on');
 document.getElementById('topTitle').textContent='Talent';
 document.getElementById('topSub').textContent=STATE.talent.searched?STATE.talent.total+' matches':'Search all candidates';
 renderTalent();
}
function renderTalent(){
 const t=STATE.talent;
 document.getElementById('content').innerHTML=`
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
   <div style="position:relative;flex:1;min-width:240px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;position:absolute;left:11px;top:9px;color:var(--text-3)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input class="input" id="tq" style="padding-left:34px" placeholder="Search name, skills, company, location, phone…" value="${esc(t.q||'')}" onkeydown="if(event.key==='Enter')runTalentSearch(1)">
   </div>
   <button class="btn btn-primary" onclick="runTalentSearch(1)">Search</button>
   <button class="btn btn-secondary" onclick="toggleTalentFilters()">Filters${filterCount()?' ('+filterCount()+')':''}</button>
   <button class="btn btn-ai" onclick="openAddCandidate('central')">${PLUS}Add candidate</button>
  </div>
  <div id="talentFilters" style="display:${t.filtersOpen?'block':'none'};margin-bottom:14px">
   <div class="card pad"><div class="grid2" style="grid-template-columns:repeat(4,1fr)">
    <div class="field2"><label>Location</label><input class="input" id="fLoc" value="${esc(t.filters.location||'')}"></div>
    <div class="field2"><label>Phone</label><input class="input" id="fPhone" value="${esc(t.filters.phone||'')}"></div>
    <div class="field2"><label>Min CTC (LPA)</label><input class="input" id="fCtcMin" value="${esc(t.filters.ctc_min||'')}"></div>
    <div class="field2"><label>Max CTC (LPA)</label><input class="input" id="fCtcMax" value="${esc(t.filters.ctc_max||'')}"></div>
    <div class="field2"><label>Min Exp (yrs)</label><input class="input" id="fExpMin" value="${esc(t.filters.exp_min||'')}"></div>
    <div class="field2"><label>Max Exp (yrs)</label><input class="input" id="fExpMax" value="${esc(t.filters.exp_max||'')}"></div>
    <div class="field2"><label>Max Notice (days)</label><input class="input" id="fNotice" value="${esc(t.filters.notice||'')}"></div>

async function runTalentSearch(page){

 if(t.q)params.set('q',t.q);
 Object.entries(t.filters||{}).forEach(([k,v])=>{if(v&&String(v).trim())params.set(k,String(v).trim());});

 const rc=document.getElementById('talentResults');if(rc)rc.innerHTML='<div class="loadwrap"><span class="spin"></span> Searching…</div>';
 try{
  const r=await api('/api/central-db/search?'+params.toString());

async function parseIntoForm(){
 const raw=(document.getElementById('ac_raw').value||'').trim();
 if(!raw)return toast('Paste some text first','warning');
 toast('Parsing…','ai');
 try{
  const r=await api('/api/parse-naukri',{method:'POST',body:JSON.stringify({raw})});
  const d=r.data||{};
  const set=(id,v)=>{const el=document.getElementById('ac_'+id);if(el&&v!=null&&v!=='')el.value=v;};
  ['name','phone','email','company','designation','location','preferred_location','qualification','career_summary'].forEach(k=>set(k,d[k]));
  ['experience','ctc_current','ctc_expected','notice_period'].forEach(k=>{if(d[k])set(k,d[k]);});
  const ks=document.getElementById('ac_key_skills');if(ks&&Array.isArray(d.key_skills))ks.value=d.key_skills.join(', ');
  toast('Parsed — review the fields, then Add','success');
 }catch(e){toast((''+e.message).includes('400')?'Add your DeepSeek key in the old app’s Settings, or fill manually':'Parse failed — fill manually','danger');}
}
async function addCandidateSave(){
 const g=(id)=>{const el=document.getElementById('ac_'+id);return el?el.value.trim():'';};
 const name=g('name'),company=g('company');
 if(!name||!company)return toast('Name and Company are required','warning');
 const skills=g('key_skills').split(',').map(s=>s.trim()).filter(Boolean);
 const payload={name,company,designation:g('designation'),experience:g('experience'),ctc_current:g('ctc_current'),ctc_expected:g('ctc_expected'),notice_period:g('notice_period'),location:g('location'),preferred_location:g('preferred_location'),qualification:g('qualification'),phone:g('phone'),email:g('email'),career_summary:g('career_summary'),key_skills:skills};
 const dest=document.getElementById('ac_dest').value;
 try{
  if(dest==='central')await api('/api/central-db/add',{method:'POST',body:JSON.stringify(payload)});
  else await api('/api/mandates/'+dest+'/candidates/manual',{method:'POST',body:JSON.stringify(payload)});
  closeModal();toast('Candidate added','success');
  if(STATE.view==='talent'&&STATE.talent.searched)runTalentSearch(STATE.talent.page);
  else if(STATE.view==='mandate'&&String(dest)===String(STATE.curMandate))selMandate(STATE.curMandate);
 }catch(e){toast('Could not add candidate','danger');}
}

 try{await api('/api/candidates/'+cid+'/stage',{method:'POST',body:JSON.stringify({stage})});
  toast('Stage → '+stage,'success');
  if(STATE.curCand&&STATE.curCand.id===cid)STATE.curCand.stage=stage;
  const lc=STATE.candidates.find(x=>x.id===cid);if(lc)lc.stage=stage;
 }catch(e){toast('Could not change stage','danger');}
}
async function aiRescore(cid){
 toast('AI re-scoring…','ai');
 try{await api('/api/candidates/'+cid+'/rate',{method:'POST',body:'{}'});
  const c=await api('/api/candidates/'+cid);STATE.curCand=c;renderCand();toast('Re-scored','success');
 }catch(e){toast((''+e.message).includes('400')?'Add your DeepSeek key in the old app’s Settings first':'Could not re-score','danger');}
}
function openEdit(cid){
 const c=STATE.curCand;
 const f=(id,label)=>`<div class="field2"><label>${label}</label><input class="input" id="ed_${id}" value="${esc(c[id]||'')}"></div>`;
 document.getElementById('modalTitle').textContent='Edit candidate';
 document.getElementById('modalSave').textContent='Save';
 document.getElementById('modalBody').innerHTML=`<div class="grid2">
   ${f('name','Name')}${f('company','Company')}${f('designation','Designation')}${f('experience','Experience')}
   ${f('ctc_current','Current CTC')}${f('ctc_expected','Expected CTC')}${f('notice_period','Notice')}${f('location','Location')}
   ${f('preferred_location','Preferred location')}${f('qualification','Qualification')}${f('phone','Phone')}${f('email','Email')}
  </div>`;
 document.getElementById('modalSave').setAttribute('onclick','saveEdit('+cid+')');
 document.getElementById('modal').classList.add('open');
}
async function saveEdit(cid){
 const ids=['name','company','designation','experience','ctc_current','ctc_expected','notice_period','location','preferred_location','qualification','phone','email'];
 const body={};ids.forEach(k=>{const el=document.getElementById('ed_'+k);if(el)body[k]=el.value;});
 try{await api('/api/candidates/'+cid,{method:'PUT',body:JSON.stringify(body)});
  closeModal();const c=await api('/api/candidates/'+cid);STATE.curCand=c;renderCand();toast('Saved','success');
 }catch(e){toast('Could not save','danger');}
}
async function delCand(cid){
 if(!confirm('Delete this candidate permanently? This cannot be undone.'))return;
 if(!confirm('Please confirm again — this removes the candidate and all their data.'))return;
 try{await api('/api/candidates/'+cid,{method:'DELETE'});
  toast('Candidate deleted','success');STATE.curCand=null;
  STATE.candidates=STATE.candidates.filter(x=>x.id!==cid);
  if(STATE.view==='talent'){STATE.talent.results=STATE.talent.results.filter(x=>x.id!==cid);STATE.talent.total=Math.max(0,STATE.talent.total-1);showTalent();}
  else renderList();
 }catch(e){toast('Could not delete','danger');}
}

boot();
</script>
</body>
</html>
