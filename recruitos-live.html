<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RecruitOS · Live</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --n0:#fff;--n25:#FAFAF9;--n50:#F4F2EC;--n100:#EBE8E1;--n200:#DED9CF;--n300:#C9C3B6;--n400:#A8A498;--n500:#8C887E;--n600:#6B675E;--n700:#504D46;--n800:#33312B;--n900:#1B1B18;
 --p50:#E8F4EE;--p100:#C9E7D8;--p500:#15966A;--p600:#127A57;--p700:#0E6045;
 --ai50:#EEECFB;--ai100:#DAD6F6;--ai500:#534AB7;--ai700:#363080;--ai-glow:linear-gradient(135deg,#6E63D1,#534AB7);
 --success:#15966A;--success-bg:#E8F4EE;--warning:#C4841E;--warning-bg:#FBF1DE;--danger:#E24B4A;--danger-bg:#FBEAEA;--info:#378ADD;--info-bg:#E7F0FB;--wa:#1FA855;
 --bg:var(--n25);--surface:#fff;--surface-2:var(--n50);--border:var(--n100);--border-strong:var(--n200);
 --text:var(--n900);--text-2:var(--n600);--text-3:var(--n500);
 --r-md:8px;--r-lg:10px;--r-xl:12px;--e1:0 1px 2px rgba(40,38,30,.06);--e2:0 4px 12px rgba(40,38,30,.08);--e4:0 16px 40px rgba(40,38,30,.16);
}
[data-theme="dark"]{--bg:#161512;--surface:#1F1E1A;--surface-2:#27251F;--border:#302E28;--border-strong:#3A382F;--text:#F4F2EC;--text-2:#A8A498;--text-3:#8C887E;--p500:#2FA574;--p50:rgba(47,165,116,.14);--p700:#63BF97;--ai500:#6E63D1;--ai50:rgba(110,99,209,.16);--ai700:#948BE0;--success-bg:rgba(47,165,116,.16);--warning-bg:rgba(196,132,30,.16);--danger-bg:rgba(226,75,74,.16);--info-bg:rgba(55,138,221,.16);}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13.5px;line-height:20px;font-feature-settings:"tnum" 1}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
h1{font-size:20px;font-weight:700;margin:0;letter-spacing:-.01em}h3{font-size:15px;font-weight:600;margin:0}
.caption{font-size:12px;color:var(--text-2)}.micro{font-size:10.5px;color:var(--text-3)}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
a{color:var(--p600);cursor:pointer;text-decoration:none}
.btn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;border:1px solid transparent;cursor:pointer}
.btn svg{width:15px;height:15px}.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-primary{background:var(--p500);color:#fff}.btn-primary:hover{background:var(--p600)}
.btn-secondary{background:var(--surface);color:var(--text);border-color:var(--border-strong)}.btn-secondary:hover{background:var(--surface-2)}
.btn-ghost{background:transparent;color:var(--text-2)}.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-ai{background:var(--ai500);color:#fff}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;background:transparent;color:var(--text-2);border-radius:var(--r-md);border:none;cursor:pointer}
.btn-icon:hover{background:var(--surface-2)}
.badge{display:inline-flex;align-items:center;gap:4px;height:20px;padding:0 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-neutral{background:var(--surface-2);color:var(--text-2)}.badge-success{background:var(--success-bg);color:var(--p700)}.badge-warning{background:var(--warning-bg);color:var(--warning)}.badge-info{background:var(--info-bg);color:var(--info)}.badge-ai{background:var(--ai50);color:var(--ai700)}.badge-live{background:var(--success-bg);color:var(--p700)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e1)}
.pad{padding:18px}
.input{height:34px;padding:0 12px;background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-md);color:var(--text);font:inherit;font-size:13.5px;width:100%}
.input:focus{outline:none;border-color:var(--p500);box-shadow:0 0 0 3px var(--p50)}
select.input{height:34px}
.avatar{width:34px;height:34px;border-radius:99px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex:none}
.avatar.sm{width:26px;height:26px;font-size:10px}.avatar.big{width:46px;height:46px;font-size:15px}
.app{display:grid;grid-template-columns:270px 1fr;height:100vh}
.side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.brand{height:54px;display:flex;align-items:center;gap:9px;padding:0 16px;border-bottom:1px solid var(--border);flex:none}
.logo{width:26px;height:26px;border-radius:7px;background:var(--ai-glow);display:flex;align-items:center;justify-content:center}
.logo svg{width:15px;height:15px;color:#fff}
.mlist{flex:1;overflow-y:auto;padding:8px}
.mrow{padding:10px 12px;border-radius:var(--r-md);cursor:pointer;margin-bottom:2px}
.mrow:hover{background:var(--surface-2)}.mrow.on{background:var(--p50)}
.mrow .mr{font-size:13px;font-weight:600}.mrow .ms{font-size:11px;color:var(--text-2)}
.main{display:flex;flex-direction:column;overflow:hidden}
.top{height:54px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;padding:0 18px;flex:none}
.content{flex:1;overflow-y:auto;padding:20px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:var(--surface-2);cursor:pointer}
.grid{display:grid;gap:16px}.g2{grid-template-columns:2fr 1fr}
@media(max-width:900px){.g2{grid-template-columns:1fr}.app{grid-template-columns:1fr}.side{display:none}}
.kv{padding:8px 0}.kv .k{font-size:10.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-3)}.kv .v{font-size:13.5px;font-weight:600}
.subhead{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.ai-block{background:var(--ai50);border-left:2px solid var(--ai500);border-radius:var(--r-md);padding:12px 14px}
.ai-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ai700);margin-bottom:6px}
.ai-tag svg{width:12px;height:12px}
.chip{display:inline-flex;height:24px;align-items:center;padding:0 10px;border-radius:99px;background:var(--surface-2);font-size:12px;font-weight:600;color:var(--text-2);margin:0 6px 6px 0}
.lrow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}.lrow:last-child{border:none}.lrow .g{flex:1}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 13px;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--p700);border-bottom-color:var(--p500)}
.notice{max-width:520px;margin:60px auto;text-align:center}
.notice .ic{width:52px;height:52px;border-radius:14px;background:var(--warning-bg);color:var(--warning);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
.notice .ic svg{width:26px;height:26px}
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--e4);border-radius:var(--r-md);padding:10px 14px;font-size:13px;font-weight:500;min-width:240px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--p500);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.loadwrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--text-2)}
.modalwrap{position:fixed;inset:0;background:rgba(27,27,24,.4);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
.modalwrap.open{display:flex}
.modalbox{width:600px;max-width:100%;background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--e4);overflow:hidden}
.modalhead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}
.modalbody{padding:18px;max-height:60vh;overflow-y:auto}
.modalfoot{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field2{display:flex;flex-direction:column;gap:5px}.field2 label{font-size:11px;font-weight:600;color:var(--text-2)}
</style>
</head>
<body>
<div id="root"></div>
<div class="modalwrap" id="modal" onclick="if(event.target===this)closeModal()">
 <div class="modalbox"><div class="modalhead"><h3 id="modalTitle">Edit</h3>
  <button class="btn-icon" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
  <div class="modalbody" id="modalBody"></div>
  <div class="modalfoot"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" id="modalSave">Save</button></div></div>
</div>
<div class="toasts" id="toasts"></div>

<script>
const SP='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l1.9 4.6L18.5 9l-3.5 3 1 5-4-2.6L8 17l1-5L5.5 9z"/></svg>';
const PLUS='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="width:14px;height:14px"><path d="M12 5v14M5 12h14"/></svg>';
const STAGES=['Screening','Follow Up 1','Follow Up 2','Not Contacted','Called','Interested','Updated CV awaited','Not Interested','Shared with Client','Interview Inprocess','Not Suitable','Client Rejected on Paper','Client Rejected After Interview','Placed'];
let STATE={user:null,mandates:[],curMandate:null,candidates:[],curCand:null,tab:'overview',reminders:[],view:'mandate',addDest:'central',talent:{q:'',filters:{},results:[],page:1,total:0,searched:false,filtersOpen:false},clients:{list:[],q:'',status:'',page:1,pages:1,total:0,cur:null,contacts:[],meta:null,tab:'overview'},convo:{tab:'inbox',status:'active',list:[],curId:null,messages:[],escalations:[],learned:[],escBadge:0},tasks:{list:[],counts:{}},insights:{range:'30',data:null},settings:{tab:'general',data:null,usageDays:30}};

async function api(path,opts){
 const o=Object.assign({credentials:'same-origin',headers:{'Content-Type':'application/json'}},opts||{});
 const r=await fetch(path,o);
 if(r.status===401){const e=new Error('auth');e.auth=true;throw e;}
 if(!r.ok)throw new Error('HTTP '+r.status);
 const ct=r.headers.get('content-type')||'';return ct.includes('json')?r.json():r.text();
}
function toast(msg,type){
 type=type||'info';const col={success:'var(--success)',warning:'var(--warning)',danger:'var(--danger)',info:'var(--info)',ai:'var(--ai500)'}[type];
 const el=document.createElement('div');el.className='toast';el.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>${msg}`;
 document.getElementById('toasts').appendChild(el);setTimeout(()=>{el.style.opacity=0;setTimeout(()=>el.remove(),200)},3000);
}
const AV=['#15966A','#534AB7','#378ADD','#C4841E','#0E6045'];
function avColor(s){s=s||'?';let n=0;for(const c of s)n+=c.charCodeAt(0);return AV[n%AV.length]}
function initials(n){n=(n||'?').trim();return n.split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase()}
function av(n,cls){return `<div class="avatar ${cls||''}" style="background:${avColor(n)}">${initials(n)}</div>`}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function stageBadge(s){s=s||'—';const t=/plac/i.test(s)?'success':/reject|not/i.test(s)?'warning':/shar|interview/i.test(s)?'info':'neutral';return `<span class="badge badge-${t}">${esc(s)}</span>`}

/* ---------- boot ---------- */
async function boot(){
 try{
  const s=await api('/api/auth/status');
  if(s.state==='setup'){return notice('First-run setup needed','Open the main app at / to create your admin account, then reopen /v2.');}
  if(s.state!=='app'){return notice('Please sign in first','Log in on your main app at <b>/</b>, then reopen <b>/v2</b> in the same browser. This page shares your login.');}
  STATE.user=s.user;
  await loadMandates();
  renderShell();
 }catch(e){
  if(e.auth)return notice('Please sign in first','Log in on your main app at <b>/</b>, then reopen <b>/v2</b>.');
  notice('Can’t reach your backend','Open this page from your Render URL at <b>/v2</b> (e.g. <span class="mono">your-app.onrender.com/v2</span>) while logged in. Opening the file directly won’t connect to your data.');
 }
}
function notice(title,body){
 document.getElementById('root').innerHTML=`<div class="notice"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17h.01"/></svg></div>
  <h1 style="margin-bottom:8px">${title}</h1><p class="caption">${body}</p><div style="margin-top:16px"><a href="/" class="btn btn-secondary" style="text-decoration:none">Go to main app</a></div></div>`;
}
async function loadMandates(){STATE.mandates=await api('/api/mandates')||[];if(STATE.mandates.length&&!STATE.curMandate)STATE.curMandate=STATE.mandates[0].id;}

/* ---------- shell ---------- */
function renderShell(){
 document.getElementById('root').innerHTML=`
 <div class="app">
  <aside class="side">
   <div class="brand" onclick="showHome()" style="cursor:pointer"><div class="logo">${SP}</div><b style="font-size:15px">RecruitOS</b><span class="badge badge-live" style="margin-left:auto">LIVE</span></div>
   <div style="padding:8px 8px 2px"><div class="mrow navitem" id="nav-home" onclick="showHome()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg>Home</div><div class="ms">Dashboard · today’s focus</div></div></div>
   <div style="padding:2px 8px 2px"><div class="mrow navitem" id="nav-talent" onclick="showTalent()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Talent</div><div class="ms">Search all candidates · Add new</div></div></div>
   <div style="padding:2px 8px 2px"><div class="mrow navitem" id="nav-clients" onclick="showClients()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 21h18M4 21V8l7-4 7 4v13M9 21v-5h6v5"/></svg>Clients</div><div class="ms">Companies · contacts · org chart</div></div></div>
   <div style="padding:2px 8px 2px"><div class="mrow navitem" id="nav-convo" onclick="showConvo()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 11.5a8.5 8.5 0 01-12.5 7.5L3 21l2-5.5A8.5 8.5 0 1121 11.5z"/></svg>Conversations<span class="badge badge-warning" id="convoNavBadge" style="height:16px;margin-left:auto;display:none"></span></div><div class="ms">WhatsApp AI · escalations</div></div></div>
   <div style="padding:2px 8px 2px"><div class="mrow navitem" id="nav-tasks" onclick="showTasks()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</div><div class="ms">Reminders · interviews · follow-ups</div></div></div>
   <div style="padding:2px 8px 2px"><div class="mrow navitem" id="nav-insights" onclick="showInsights()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Insights</div><div class="ms">Analytics · funnel · sources</div></div></div>
   <div style="padding:2px 8px 8px"><div class="mrow navitem" id="nav-settings" onclick="showSettings()"><div class="mr" style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 00-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 00-1.7 1l-2.4-1-2 3.5 2 1.5a7 7 0 000 2l-2 1.5 2 3.5 2.4-1a7 7 0 001.7 1l.4 2.5h4l.4-2.5a7 7 0 001.7-1l2.4 1 2-3.5-2-1.5a7 7 0 00.1-1z"/></svg>Settings</div><div class="ms">Keys · email · team & admin</div></div></div>
   <div style="padding:10px 12px 4px" class="eyebrow">Mandates (${STATE.mandates.length})</div>
   <div class="mlist" id="mlist">${STATE.mandates.map(m=>`<div class="mrow ${m.id===STATE.curMandate?'on':''}" onclick="selMandate(${m.id})"><div class="mr">${esc(m.role||'Untitled')}</div><div class="ms">${esc(m.client||'')} ${m.location?'· '+esc(m.location):''}</div></div>`).join('')||'<div class="caption" style="padding:10px">No mandates found.</div>'}</div>
  </aside>
  <div class="main">
   <div class="top"><b id="topTitle">Candidates</b><span class="caption" id="topSub"></span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
     <span class="badge badge-neutral">${esc(STATE.user.display_name||STATE.user.username)}</span>
     <button class="btn-icon" onclick="toggleTheme()" title="Theme">${themeIcon()}</button>
     <a href="/" class="btn btn-ghost btn-sm">Old app</a>
    </div></div>
   <div class="content" id="content"></div>
  </div>
 </div>`;
 showHome();
 updateConvoBadge();
}
function themeIcon(){return document.documentElement.getAttribute('data-theme')==='dark'
 ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>'
 :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg>';}
function toggleTheme(){const r=document.documentElement;r.setAttribute('data-theme',r.getAttribute('data-theme')==='dark'?'light':'dark');const b=event.currentTarget;if(b)b.innerHTML=themeIcon();}

async function selMandate(mid){
 STATE.view='mandate';STATE.curMandate=mid;STATE.curCand=null;
 document.querySelectorAll('.mrow').forEach(x=>x.classList.remove('on'));
 const el=[...document.querySelectorAll('.mrow')].find(x=>x.getAttribute('onclick')==='selMandate('+mid+')');if(el)el.classList.add('on');
 const m=STATE.mandates.find(x=>x.id===mid)||{};
 document.getElementById('topTitle').textContent=m.role||'Candidates';
 document.getElementById('content').innerHTML='<div class="loadwrap"><span class="spin"></span> Loading your candidates…</div>';
 try{
  STATE.candidates=await api('/api/mandates/'+mid+'/candidates')||[];
  document.getElementById('topSub').textContent=STATE.candidates.length+' candidates';
  renderList();
 }catch(e){document.getElementById('content').innerHTML='<div class="caption" style="padding:20px">Could not load candidates. '+esc(e.message)+'</div>';}
}
function renderList(){
 const cs=STATE.candidates;
 document.getElementById('content').innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
   <div class="caption">${cs.length} candidate${cs.length===1?'':'s'} in this mandate</div>
   <button class="btn btn-ai btn-sm" onclick="openAddCandidate(${STATE.curMandate})">${PLUS}Add candidate</button>
  </div>
  <div class="card" style="overflow:hidden">
   <table class="tbl"><thead><tr><th>Candidate</th><th>Company · Role</th><th>CTC</th><th>Notice</th><th>Stage</th><th>AI fit</th></tr></thead>
   <tbody>${cs.length?cs.map(c=>`<tr onclick="openCand(${c.id})">
     <td><div style="display:flex;align-items:center;gap:9px">${av(c.name,'sm')}<b>${esc(c.name||'—')}</b></div></td>
     <td class="caption">${esc(c.company||'—')}${c.designation?' · '+esc(c.designation):''}</td>
     <td class="mono">${c.ctc_current?esc(c.ctc_current):'—'}</td>
     <td class="caption">${esc(c.notice_period||'—')}</td>

async function parseIntoForm(){
 const raw=(document.getElementById('ac_raw').value||'').trim();
 if(!raw)return toast('Paste some text first','warning');
 toast('Parsing…','ai');
 try{
  const r=await api('/api/parse-naukri',{method:'POST',body:JSON.stringify({raw})});
  const d=r.data||{};
  const set=(id,v)=>{const el=document.getElementById('ac_'+id);if(el&&v!=null&&v!=='')el.value=v;};
  ['name','phone','email','company','designation','location','preferred_location','qualification','career_summary'].forEach(k=>set(k,d[k]));
  ['experience','ctc_current','ctc_expected','notice_period'].forEach(k=>{if(d[k])set(k,d[k]);});
  const ks=document.getElementById('ac_key_skills');if(ks&&Array.isArray(d.key_skills))ks.value=d.key_skills.join(', ');
  toast('Parsed — review the fields, then Add','success');
 }catch(e){toast((''+e.message).includes('400')?'Add your DeepSeek key in the old app’s Settings, or fill manually':'Parse failed — fill manually','danger');}
}
async function addCandidateSave(){
 const g=(id)=>{const el=document.getElementById('ac_'+id);return el?el.value.trim():'';};
 const name=g('name'),company=g('company');
 if(!name||!company)return toast('Name and Company are required','warning');
 const skills=g('key_skills').split(',').map(s=>s.trim()).filter(Boolean);
 const payload={name,company,designation:g('designation'),experience:g('experience'),ctc_current:g('ctc_current'),ctc_expected:g('ctc_expected'),notice_period:g('notice_period'),location:g('location'),preferred_location:g('preferred_location'),qualification:g('qualification'),phone:g('phone'),email:g('email'),career_summary:g('career_summary'),key_skills:skills};
 const dest=document.getElementById('ac_dest').value;
 try{
  if(dest==='central')await api('/api/central-db/add',{method:'POST',body:JSON.stringify(payload)});
  else await api('/api/mandates/'+dest+'/candidates/manual',{method:'POST',body:JSON.stringify(payload)});
  closeModal();toast('Candidate added','success');
  if(STATE.view==='talent'&&STATE.talent.searched)runTalentSearch(STATE.talent.page);
  else if(STATE.view==='mandate'&&String(dest)===String(STATE.curMandate))selMandate(STATE.curMandate);
 }catch(e){toast('Could not add candidate','danger');}
}

async function loadTasks(){
 document.getElementById('content').innerHTML='<div class="loadwrap"><span class="spin"></span> Loading your tasks…</div>';
 try{const r=await api('/api/tasks');STATE.tasks.list=r.tasks||[];STATE.tasks.counts=r.counts||{};renderTasks();}
 catch(e){document.getElementById('content').innerHTML='<div class="caption" style="padding:20px">Could not load tasks. '+esc(e.message)+'</div>';}

function taskTypeBadge(t){const map={reminder:['info','Reminder'],interview:['ai','Interview'],stale:['warning','Stale'],promise:['warning','Promise'],submission:['success','New applicant'],updated:['info','Updated CV']};const m=map[t]||['neutral',t];return `<span class="badge badge-${m[0]}" style="height:18px">${m[1]}</span>`;}
function renderTasks(){
 const secs=[['overdue','Overdue'],['today','Today'],['tomorrow','Tomorrow'],['upcoming','Upcoming']];
 const cnt=STATE.tasks.counts||{};
 const bySec={};STATE.tasks.list.forEach(t=>{(bySec[t.section]=bySec[t.section]||[]).push(t);});
 const body=secs.map(([k,label])=>{
   const items=bySec[k]||[];if(!items.length)return '';
   return `<div style="margin-bottom:18px"><div class="subhead" style="margin-bottom:8px">${label} <span class="badge badge-${k==='overdue'?'danger':k==='today'?'warning':'neutral'}" style="height:16px">${items.length}</span></div>
    <div class="card" style="overflow:hidden">${items.map(t=>taskRow(t)).join('')}</div></div>`;
 }).join('');
 document.getElementById('content').innerHTML=`
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
   ${['overdue','today','tomorrow','upcoming'].map(k=>`<div class="card pad" style="flex:1;min-width:110px;text-align:center"><div style="font-size:22px;font-weight:700">${cnt[k]||0}</div><div class="micro" style="text-transform:capitalize">${k}</div></div>`).join('')}
  </div>
  ${body||'<div class="card pad caption" style="text-align:center">Nothing pending. You’re all caught up! 🎉</div>'}`;
}
function taskRow(t){
 const clickable=t.candidate_id?`onclick="openCand(${t.candidate_id})" style="cursor:pointer"`:'';
 const wa=t.phone?`<a class="btn-icon" title="WhatsApp" href="https://wa.me/${esc((t.phone||'').replace(/[^0-9]/g,''))}" target="_blank" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="var(--wa)" style="width:16px;height:16px"><path d="M12 2a10 10 0 00-8.5 15.3L2 22l4.8-1.5A10 10 0 1012 2z"/></svg></a>`:'';
 return `<div class="lrow" style="padding:11px 14px;align-items:center">
   <div class="g" ${clickable}>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${taskTypeBadge(t.type)}<b style="font-size:13px">${esc(t.title||'')}</b></div>
    <div class="caption">${esc(t.subtitle||'')}</div>
   </div>
   <div style="display:flex;gap:4px;align-items:center">${wa}
    <button class="btn-icon" title="Snooze 1 day" onclick="event.stopPropagation();snoozeTask('${t.type}',${t.ref_id},1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></button>
    <button class="btn-icon" title="Done" onclick="event.stopPropagation();doneTask('${t.type}',${t.ref_id})"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.2" style="width:16px;height:16px"><path d="M5 12l5 5L20 6"/></svg></button>
   </div>
  </div>`;
}
async function doneTask(type,ref_id){
 try{await api('/api/tasks/done',{method:'POST',body:JSON.stringify({type,ref_id})});toast('Marked done','success');
  STATE.tasks.list=STATE.tasks.list.filter(t=>!(t.type===type&&t.ref_id===ref_id));if(STATE.tasks.counts.total)STATE.tasks.counts.total--;renderTasks();}
 catch(e){toast('Could not update','danger');}
}
async function snoozeTask(type,ref_id,days){
 const d=new Date();d.setDate(d.getDate()+(days||1));const snoozed_until=d.toISOString().slice(0,19);
 try{await api('/api/tasks/snooze',{method:'POST',body:JSON.stringify({type,ref_id,snoozed_until})});toast('Snoozed '+days+'d','success');
  STATE.tasks.list=STATE.tasks.list.filter(t=>!(t.type===type&&t.ref_id===ref_id));renderTasks();}
 catch(e){toast('Could not snooze','danger');}
}

 if(STATE.settings.tab!=='admin')return;
 const pendingHtml=pending.length?`<div class="card pad" style="margin-bottom:16px"><div class="subhead">Pending approvals (${pending.length})</div>${pending.map(p=>`<div class="lrow"><div class="g"><b style="font-size:12.5px">${esc(p.display_name||p.username)}</b><div class="micro">${esc(p.username)}${p.company_name?' · '+esc(p.company_name):''}</div></div><div style="display:flex;gap:6px"><button class="btn btn-primary btn-sm" onclick="approveUser(${p.id})">Approve</button><button class="btn btn-secondary btn-sm" onclick="rejectUser(${p.id})">Reject</button></div></div>`).join('')}</div>`:'';
 const usageHtml=(usage&&usage.usage&&usage.usage.length)?`<div class="card pad" style="margin-bottom:16px"><div class="subhead">API usage &amp; cost (last ${usage.days}d · total $${usage.grand_total_usd})</div>${usage.usage.map(a=>{const provs=Object.entries(a.providers||{}).map(([p,v])=>p+': $'+v.cost_usd+' ('+v.calls+')').join(' · ');return `<div class="lrow"><div class="g"><b style="font-size:12.5px">${esc(a.company||'')}</b><div class="micro">${esc(provs)}</div></div><span class="badge badge-neutral mono">$${a.total_cost}</span></div>`;}).join('')}</div>`:'';
 const usersHtml=`<div class="card" style="overflow:hidden;margin-bottom:16px"><table class="tbl"><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Mandates</th><th>Candidates</th><th>Last login</th></tr></thead><tbody>${users.map(u=>`<tr><td><b>${esc(u.display_name||u.username)}</b><div class="micro">${esc(u.username)}</div></td><td class="caption">${esc(u.role||'')}</td><td>${u.status==='approved'?'<span class="badge badge-success">Approved</span>':'<span class="badge badge-neutral">'+esc(u.status||'')+'</span>'}</td><td class="mono">${u.mandate_count||0}</td><td class="mono">${u.candidate_count||0}</td><td class="caption mono">${esc((u.last_login||'').slice(0,10)||'—')}</td></tr>`).join('')}</tbody></table></div>`;
 const addForm=`<div class="card pad" style="max-width:640px"><div class="subhead">Add a team member</div>
   <div class="grid2"><div class="field2"><label>Username</label><input class="input" id="nu_username"></div><div class="field2"><label>Password (min 4)</label><input class="input" type="password" id="nu_password"></div></div>
   <div class="field2" style="margin-top:12px;max-width:220px"><label>Role</label><select class="input" id="nu_role"><option value="user">Recruiter</option><option value="admin">Admin</option></select></div>
   <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="addUser()">Create user</button></div>`;
 document.getElementById('setBody').innerHTML=pendingHtml+`<div class="subhead">Team members (${users.length})</div>`+usersHtml+usageHtml+addForm;
}
async function approveUser(id){try{await api('/api/admin/pending-users/'+id+'/approve',{method:'POST',body:'{}'});toast('User approved','success');renderSettingsAdmin();}catch(e){toast('Could not approve','danger');}}
async function rejectUser(id){if(!confirm('Reject this user?'))return;try{await api('/api/admin/pending-users/'+id+'/reject',{method:'POST',body:'{}'});toast('User rejected','success');renderSettingsAdmin();}catch(e){toast('Could not reject','danger');}}
async function addUser(){
 const u=(document.getElementById('nu_username').value||'').trim();
 const p=(document.getElementById('nu_password').value||'');
 const role=document.getElementById('nu_role').value;
 if(!u||p.length<4)return toast('Username + password (min 4 chars) required','warning');
 try{await api('/api/users',{method:'POST',body:JSON.stringify({username:u,password:p,role})});toast('User created','success');renderSettingsAdmin();}
 catch(e){toast('Username may be taken, or you’re not an admin','danger');}
}

/* ---------- candidate detail ---------- */
async function openCand(cid){
 document.getElementById('content').innerHTML='<div class="loadwrap"><span class="spin"></span> Loading profile…</div>';
 try{
  const c=await api('/api/candidates/'+cid);STATE.curCand=c;STATE.tab='overview';
  try{const rr=await api('/api/reminders');STATE.reminders=(rr&&rr.reminders||[]).filter(r=>r.candidate_id===cid);}catch(e){STATE.reminders=[];}
  renderCand();
 }catch(e){document.getElementById('content').innerHTML='<div class="caption" style="padding:20px">Could not load candidate. '+esc(e.message)+'</div>';}
}
function renderCand(){
 const c=STATE.curCand;
 const skills=Array.isArray(c.key_skills)?c.key_skills:[];
 const tabs=[['overview','Overview'],['resume','Resume'],['communications','Communications'],['interviews','Interviews'],['history','History']];
 document.getElementById('content').innerHTML=`
  <div style="margin-bottom:14px"><a onclick="goBack()">← Back</a></div>
  <div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap">
   ${av(c.name,'big')}
   <div style="flex:1;min-width:160px"><h1>${esc(c.name||'—')}</h1><div class="caption">${esc(c.designation||'')}${c.company?' · '+esc(c.company):''}${c.is_mnc?' · MNC':''}</div></div>
   ${c.ai_score?`<span class="badge badge-ai">${esc(c.ai_score)}% fit</span>`:''}
   <select class="input" style="width:auto" onchange="changeStage(${c.id},this.value)" title="Stage">
     ${STAGES.map(s=>`<option ${s===c.stage?'selected':''}>${s}</option>`).join('')}${STAGES.includes(c.stage)?'':`<option selected>${esc(c.stage||'')}</option>`}
   </select>
   <button class="btn btn-ai btn-sm" onclick="aiRescore(${c.id})">${SP.replace('<svg','<svg style=\"width:14px;height:14px\"')}Re-score</button>
   <button class="btn btn-secondary btn-sm" onclick="openEdit(${c.id})">Edit</button>
   <button class="btn btn-secondary btn-sm" onclick="reqUpdate(${c.id})">Request update</button>
   <button class="btn-icon" title="Delete" onclick="delCand(${c.id})"><svg viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" style="width:16px;height:16px"><path d="M4 7h16M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2M6 7l1 13h10l1-13"/></svg></button>
  </div>
  <div class="tabs">${tabs.map(t=>`<button class="tab ${STATE.tab===t[0]?'on':''}" onclick="candTab('${t[0]}')">${t[1]}</button>`).join('')}</div>
  <div id="candBody">${candBody()}</div>`;
}
function candTab(t){STATE.tab=t;document.getElementById('candBody').innerHTML=candBody();}
function candBody(){
 const c=STATE.curCand;
 if(STATE.tab==='resume')return resumeTab(c);
 if(STATE.tab==='communications')return commsTab(c);
 if(STATE.tab==='interviews')return interviewsTab(c);
 if(STATE.tab==='history')return historyTab(c);
 return overviewTab(c);
}
function overviewTab(c){
 const skills=Array.isArray(c.key_skills)?c.key_skills:[];
 return `<div class="grid g2" style="align-items:start">
  <div style="display:flex;flex-direction:column;gap:16px">
   ${c.career_summary?`<div class="ai-block"><div class="ai-tag">${SP}Summary</div>${esc(c.career_summary)}</div>`:''}
   ${c.ai_reasoning?`<div class="card pad"><div class="subhead">AI reasoning${c.ai_score?' · '+esc(c.ai_score)+'%':''}</div><div class="caption" style="color:var(--text)">${esc(c.ai_reasoning)}</div></div>`:''}
   ${skills.length?`<div class="card pad"><div class="subhead">Key skills</div><div>${skills.map(s=>`<span class="chip">${esc(s)}</span>`).join('')}</div></div>`:''}
   <div class="card pad"><div class="subhead">Notes</div>
    <div style="display:flex;gap:8px;margin-bottom:12px"><input class="input" id="noteInput" placeholder="Add a note…" onkeydown="if(event.key==='Enter')saveNote()"><button class="btn btn-secondary btn-sm" onclick="saveNote()">Add</button></div>
    ${c.general_comments?`<div class="lrow"><div class="g">${esc(c.general_comments)}</div></div>`:'<div class="caption">Notes save to the candidate journey (History tab).</div>'}
   </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:16px">
   <div class="card pad"><div class="subhead">Key facts</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 14px">
     ${kv('Current CTC',c.ctc_current)}${kv('Expected',c.ctc_expected)}
     ${kv('Notice',c.notice_period)}${kv('Experience',c.experience)}
     ${kv('Location',c.location)}${kv('Prefers',c.preferred_location)}
     ${kv('Qualification',c.qualification)}${kv('Industry',c.industry_background)}
     ${kv('Phone',c.phone)}${kv('Email',c.email)}
    </div>
    ${c.wa_response?`<div style="margin-top:10px"><span class="badge" style="background:rgba(31,168,85,.12);color:var(--wa)">WhatsApp: ${esc(c.wa_response)}</span></div>`:''}
   </div>
   <div class="card pad"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="subhead" style="margin:0">Reminders</div></div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px">
     <input class="input" id="remNote" placeholder="Reminder note…"><input class="input" id="remDue" type="date" style="width:150px">
    </div><button class="btn btn-secondary btn-sm" onclick="saveReminder()">Add reminder</button>
    <div style="margin-top:12px">${STATE.reminders.length?STATE.reminders.map(r=>`<div class="lrow"><div class="g"><div style="font-size:12.5px;font-weight:600">${esc(r.note||'Reminder')}</div><div class="micro mono">${esc(r.due_at||'')}</div></div>
      <button class="btn-icon" title="Done" onclick="remDone(${r.id})"><svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.2" style="width:15px;height:15px"><path d="M5 12l5 5L20 6"/></svg></button></div>`).join(''):'<div class="caption">No reminders for this candidate.</div>'}</div>
   </div>
  </div>
 </div>`;
}
function kv(k,v){return `<div class="kv"><div class="k">${k}</div><div class="v">${v?esc(v):'—'}</div></div>`}
function resumeTab(c){
 const wh=c.work_history||[];
 return `<div class="grid g2" style="align-items:start">
  <div class="card pad"><div class="subhead">CV</div>
   ${c.cv_original_name?`<div class="lrow"><div class="g"><b>${esc(c.cv_original_name)}</b></div><a href="/api/cv-view/${encodeURIComponent(c.cv_path||'')}" target="_blank" class="btn btn-secondary btn-sm">Open CV</a></div>`:'<div class="caption">No CV uploaded.</div>'}
  </div>
  <div class="card pad"><div class="subhead">Work history</div>
   ${wh.length?wh.map(w=>`<div class="lrow"><div class="g"><div style="font-weight:600">${esc(w.title||w.designation||'')}</div><div class="caption">${esc(w.company||'')}</div></div><div class="caption mono">${esc(w.duration||w.period||'')}</div></div>`).join(''):'<div class="caption">No work history parsed.</div>'}
  </div>
 </div>`;
}
function commsTab(c){
 setTimeout(async()=>{
  if(STATE.tab!=='communications')return;
  let emailHtml='<div class="caption">No emails logged.</div>';
  try{const e=await api('/api/candidates/'+c.id+'/email-history');const list=(e&&e.emails)||[];
   if(list.length)emailHtml=list.map(m=>`<div class="lrow"><div class="g"><div style="font-size:12.5px">${esc(m.text)}</div><div class="micro mono">${esc(m.ts||'')}</div></div></div>`).join('');
  }catch(err){emailHtml='<div class="caption">Could not load email history.</div>';}
  const wa=c.wa_response?`<div style="margin-bottom:8px"><span class="badge" style="background:rgba(31,168,85,.12);color:var(--wa)">WhatsApp response</span></div>
    <div class="lrow"><div class="g"><div style="font-size:13px">${esc(c.wa_response)}</div>${c.wa_response_note?`<div class="caption">${esc(c.wa_response_note)}</div>`:''}<div class="micro mono">${esc(c.wa_response_at||'')}</div></div></div>`
    :'<div class="caption">No WhatsApp response captured.</div>';
  const el=document.getElementById('candBody');if(el&&STATE.tab==='communications')el.innerHTML=`<div class="grid g2" style="align-items:start">
   <div class="card pad"><div class="subhead">Email history</div>${emailHtml}
    <div class="micro" style="margin-top:10px">Sending email uses your SMTP/Gmail from the old app’s Settings.</div></div>
   <div class="card pad"><div class="subhead">WhatsApp</div>${wa}</div></div>`;
 },10);
 return '<div class="loadwrap"><span class="spin"></span> Loading communications…</div>';
}
function interviewsTab(c){
 setTimeout(async()=>{
  if(STATE.tab!=='interviews')return;
  let list=[];try{const r=await api('/api/candidates/'+c.id+'/interviews');list=(r&&r.interviews)||[];}catch(e){}
  const rows=list.length?list.map(iv=>`<div class="lrow"><div class="g"><div style="font-weight:600;font-size:12.5px">${esc(iv.round_name||'Interview')}${iv.mode?' · '+esc(iv.mode):''}</div>
    <div class="micro mono">${esc(iv.scheduled_at||'')}</div>${iv.interviewer?`<div class="caption">Interviewer: ${esc(iv.interviewer)}</div>`:''}</div>
    <span class="badge badge-${/result|clear|select|pass/i.test(iv.status||iv.result||'')?'success':'neutral'}">${esc(iv.result||iv.status||'scheduled')}</span></div>`).join(''):'<div class="caption">No interviews yet.</div>';
  const el=document.getElementById('candBody');if(el&&STATE.tab==='interviews')el.innerHTML=`<div class="grid g2" style="align-items:start">
   <div class="card pad"><div class="subhead">Rounds</div>${rows}</div>
   <div class="card pad"><div class="subhead">Schedule a round</div>
    <div style="display:flex;flex-direction:column;gap:10px">
     <input class="input" id="ivRound" placeholder="Round name (e.g. Client R1)">
     <input class="input" id="ivMode" placeholder="Mode (e.g. Video / In-person)">
     <input class="input" id="ivWhen" type="datetime-local">
     <button class="btn btn-primary btn-sm" onclick="scheduleIv(${c.id})" style="align-self:flex-start">Schedule</button>
    </div><div class="micro" style="margin-top:8px">Adds an interview + moves the candidate to “Interview Inprocess” (same as your old app).</div></div>
  </div>`;
 },10);
 return '<div class="loadwrap"><span class="spin"></span> Loading interviews…</div>';
}
async function scheduleIv(cid){
 const round_name=(document.getElementById('ivRound').value||'').trim();
 const mode=(document.getElementById('ivMode').value||'').trim();
 const scheduled_at=(document.getElementById('ivWhen').value||'').trim();
 if(!scheduled_at)return toast('Pick a date & time','warning');
 try{await api('/api/candidates/'+cid+'/interviews',{method:'POST',body:JSON.stringify({round_name,mode,scheduled_at})});
  toast('Interview scheduled','success');
  const c=await api('/api/candidates/'+cid);STATE.curCand=c;renderCand();}
 catch(e){toast('Could not schedule','danger');}
}
async function historyTab(c){
 document.getElementById('candBody')&&(document.getElementById('candBody').dataset.loading='1');
 let html='<div class="card pad"><div class="subhead">Journey</div><div class="loadwrap"><span class="spin"></span></div></div>';
 setTimeout(async()=>{
  try{const j=await api('/api/candidates/'+c.id+'/journey');const ev=(j&&(j.events||j.journey||j))||[];
   const arr=Array.isArray(ev)?ev:[];
   const body=arr.length?arr.map(e=>`<div class="lrow"><div class="g"><div style="font-size:12.5px;font-weight:600">${esc(e.detail||e.type||e.event||'')}</div><div class="micro mono">${esc(e.created_at||e.at||'')}</div></div></div>`).join(''):'<div class="caption">No journey events yet.</div>';
   const el=document.getElementById('candBody');if(el&&STATE.tab==='history')el.innerHTML='<div class="card pad"><div class="subhead">Journey</div>'+body+'</div>';
  }catch(e){const el=document.getElementById('candBody');if(el&&STATE.tab==='history')el.innerHTML='<div class="card pad caption">Could not load journey.</div>';}
 },10);
 return html;
}

/* ---------- WRITES (safe, additive, existing endpoints) ---------- */
async function saveNote(){
 const el=document.getElementById('noteInput');const text=(el&&el.value||'').trim();
 if(!text)return toast('Type a note first','warning');
 try{await api('/api/candidates/'+STATE.curCand.id+'/note',{method:'POST',body:JSON.stringify({text})});
  toast('Note saved','success');el.value='';}
 catch(e){toast('Could not save note','danger');}
}
async function saveReminder(){
 const note=(document.getElementById('remNote').value||'').trim();
 const due=(document.getElementById('remDue').value||'').trim();
 if(!due)return toast('Pick a due date','warning');
 try{await api('/api/reminders',{method:'POST',body:JSON.stringify({candidate_id:STATE.curCand.id,note,due_at:due})});
  toast('Reminder set','success');
  const rr=await api('/api/reminders');STATE.reminders=(rr&&rr.reminders||[]).filter(r=>r.candidate_id===STATE.curCand.id);
  document.getElementById('candBody').innerHTML=candBody();}
 catch(e){toast('Could not set reminder','danger');}
}
async function remDone(rid){
 try{await api('/api/reminders/'+rid+'/done',{method:'POST',body:'{}'});toast('Reminder completed','success');
  STATE.reminders=STATE.reminders.filter(r=>r.id!==rid);document.getElementById('candBody').innerHTML=candBody();}
 catch(e){toast('Could not complete','danger');}
}
async function reqUpdate(cid){
 try{await api('/api/candidates/'+cid+'/request-update',{method:'POST',body:'{}'});toast('Profile-update link generated','success');}
 catch(e){toast('Could not generate link','danger');}
}

/* Wave 3: stage change · edit · re-score · delete (existing endpoints) */
function closeModal(){document.getElementById('modal').classList.remove('open')}
async function changeStage(cid,stage){
 try{await api('/api/candidates/'+cid+'/stage',{method:'POST',body:JSON.stringify({stage})});
  toast('Stage → '+stage,'success');
  if(STATE.curCand&&STATE.curCand.id===cid)STATE.curCand.stage=stage;
  const lc=STATE.candidates.find(x=>x.id===cid);if(lc)lc.stage=stage;
 }catch(e){toast('Could not change stage','danger');}
}
async function aiRescore(cid){
 toast('AI re-scoring…','ai');
 try{await api('/api/candidates/'+cid+'/rate',{method:'POST',body:'{}'});
  const c=await api('/api/candidates/'+cid);STATE.curCand=c;renderCand();toast('Re-scored','success');
 }catch(e){toast((''+e.message).includes('400')?'Add your DeepSeek key in the old app’s Settings first':'Could not re-score','danger');}
}
function openEdit(cid){
 const c=STATE.curCand;
 const f=(id,label)=>`<div class="field2"><label>${label}</label><input class="input" id="ed_${id}" value="${esc(c[id]||'')}"></div>`;
 document.getElementById('modalTitle').textContent='Edit candidate';
 document.getElementById('modalSave').textContent='Save';
 document.getElementById('modalBody').innerHTML=`<div class="grid2">
   ${f('name','Name')}${f('company','Company')}${f('designation','Designation')}${f('experience','Experience')}
   ${f('ctc_current','Current CTC')}${f('ctc_expected','Expected CTC')}${f('notice_period','Notice')}${f('location','Location')}
   ${f('preferred_location','Preferred location')}${f('qualification','Qualification')}${f('phone','Phone')}${f('email','Email')}
  </div>`;
 document.getElementById('modalSave').setAttribute('onclick','saveEdit('+cid+')');
 document.getElementById('modal').classList.add('open');
}
async function saveEdit(cid){
 const ids=['name','company','designation','experience','ctc_current','ctc_expected','notice_period','location','preferred_location','qualification','phone','email'];
 const body={};ids.forEach(k=>{const el=document.getElementById('ed_'+k);if(el)body[k]=el.value;});
 try{await api('/api/candidates/'+cid,{method:'PUT',body:JSON.stringify(body)});
  closeModal();const c=await api('/api/candidates/'+cid);STATE.curCand=c;renderCand();toast('Saved','success');
 }catch(e){toast('Could not save','danger');}
}
async function delCand(cid){
 if(!confirm('Delete this candidate permanently? This cannot be undone.'))return;
 if(!confirm('Please confirm again — this removes the candidate and all their data.'))return;
 try{await api('/api/candidates/'+cid,{method:'DELETE'});
  toast('Candidate deleted','success');STATE.curCand=null;
  STATE.candidates=STATE.candidates.filter(x=>x.id!==cid);
  if(STATE.view==='talent'){STATE.talent.results=STATE.talent.results.filter(x=>x.id!==cid);STATE.talent.total=Math.max(0,STATE.talent.total-1);showTalent();}
  else renderList();
 }catch(e){toast('Could not delete','danger');}
}

boot();
</script>
</body>
